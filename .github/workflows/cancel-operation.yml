name: Cancel Expert Team Operation
run-name: cancel-${{ inputs.operation_id }}

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: Existing production operation ID to cancel
        required: true
        type: string
      reason:
        description: User or operator cancellation reason
        required: false
        default: user_requested
        type: string

permissions:
  actions: write
  contents: write

jobs:
  cancel:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Cancel matching operation Runs and release lock
        env:
          PYTHONPATH: .
          GH_TOKEN: ${{ github.token }}
        run: |
          python -m scripts.cancel_operation \
            --operation-id "${{ inputs.operation_id }}" \
            --reason "${{ inputs.reason }}"

      - name: Publish cancellation result and audit
        if: always()
        env:
          PYTHONPATH: .
          GH_TOKEN: ${{ github.token }}
        run: python -m scripts.publish_runtime_result --operation-id "${{ inputs.operation_id }}"

      - name: Build final local cancellation audit
        if: always()
        env:
          PYTHONPATH: .
          GH_TOKEN: ${{ github.token }}
        run: python -m scripts.build_operation_audit --operation-id "${{ inputs.operation_id }}"

      - name: Upload cancellation audit artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cancellation-${{ inputs.operation_id }}
          path: artifacts/${{ inputs.operation_id }}/
          if-no-files-found: warn
          retention-days: 7
