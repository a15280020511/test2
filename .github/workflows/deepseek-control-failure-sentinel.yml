name: DeepSeek Control Failure Sentinel
run-name: "DeepSeek Control Sentinel · ${{ github.event.workflow_run.id }}"

on:
  workflow_run:
    workflows:
      - DeepSeek Control Plane
    types: [completed]

permissions:
  actions: write
  contents: read

concurrency:
  group: "deepseek-control-sentinel-${{ github.event.workflow_run.id }}"
  cancel-in-progress: false

jobs:
  diagnose-and-route:
    if: ${{ github.event.workflow_run.conclusion != 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Diagnose and route control failure without checkout
        env:
          GH_TOKEN: ${{ github.token }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          mkdir -p control-sentinel-output
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import re
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path
          from typing import Any

          API = "https://api.github.com"
          REPO = os.environ["GITHUB_REPOSITORY"]
          OUT = Path("control-sentinel-output")


          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req: Any, fp: Any, code: int, msg: str, headers: Any, newurl: str) -> None:
                  return None


          def required(name: str) -> str:
              value = os.environ.get(name, "").strip()
              if not value:
                  raise RuntimeError(f"missing required value: {name}")
              return value


          def github(
              method: str,
              path: str,
              payload: dict[str, Any] | None = None,
              *,
              binary: bool = False,
          ) -> Any:
              data = None if payload is None else json.dumps(payload, ensure_ascii=False).encode("utf-8")
              headers = {
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {required('GH_TOKEN')}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "deepseek-control-failure-sentinel",
              }
              if data is not None:
                  headers["Content-Type"] = "application/json"
              request = urllib.request.Request(
                  f"{API}{path}",
                  data=data,
                  headers=headers,
                  method=method,
              )
              opener = urllib.request.build_opener(NoRedirect)
              try:
                  with opener.open(request, timeout=120) as response:
                      raw = response.read()
                      if binary:
                          return raw
                      return json.loads(raw.decode("utf-8")) if raw else {"http_status": response.status}
              except urllib.error.HTTPError as exc:
                  if exc.code in {301, 302, 303, 307, 308}:
                      location = exc.headers.get("Location", "")
                      if not location:
                          raise RuntimeError("GitHub log redirect had no location") from exc
                      redirected = urllib.request.Request(
                          location,
                          headers={"Accept": "*/*", "User-Agent": "deepseek-control-failure-sentinel"},
                      )
                      with urllib.request.urlopen(redirected, timeout=180) as response:  # noqa: S310
                          return response.read() if binary else json.loads(response.read().decode("utf-8"))
                  body = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(
                      f"GitHub API {method} {path} failed: HTTP {exc.code}: {body[:4000]}"
                  ) from exc


          def version(model_id: str) -> tuple[int, ...]:
              return tuple(int(value) for value in re.findall(r"\d+", model_id.lower()))


          def call_deepseek(packet: dict[str, Any]) -> dict[str, Any]:
              key = required("DEEPSEEK_API_KEY")
              headers = {"Accept": "application/json", "Authorization": f"Bearer {key}"}
              request = urllib.request.Request("https://api.deepseek.com/models", headers=headers)
              with urllib.request.urlopen(request, timeout=120) as response:  # noqa: S310
                  models = json.loads(response.read().decode("utf-8")).get("data", [])
              candidates = [
                  str(item.get("id", ""))
                  for item in models
                  if str(item.get("id", "")).lower().startswith("deepseek")
                  or str(item.get("owned_by", "")).lower() == "deepseek"
              ]
              if not candidates:
                  raise RuntimeError("DeepSeek /models returned no usable model")
              premium = [
                  model
                  for model in candidates
                  if any(token in model.lower() for token in ("pro", "max", "ultra", "expert"))
              ]
              non_light = [
                  model
                  for model in candidates
                  if not any(token in model.lower() for token in ("flash", "lite", "mini"))
              ]
              model = max(
                  premium or non_light or candidates,
                  key=lambda value: (version(value), value.lower()),
              )
              body = json.dumps(
                  {
                      "model": model,
                      "messages": [
                          {
                              "role": "system",
                              "content": (
                                  "You are the isolated highest-priority supervisor for the independent DeepSeek "
                                  "control plane. Diagnose only from supplied evidence. Return JSON only with decision "
                                  "RETRY, REPAIR, WAIT, or STOP; root_cause; evidence[]; required_actions[]; "
                                  "failure_scope CONTROL_REPOSITORY, TARGET_REPOSITORY, EXTERNAL, or UNKNOWN; and confidence. "
                                  "Use REPAIR only for a persistent control-repository defect."
                              ),
                          },
                          {"role": "user", "content": json.dumps(packet, ensure_ascii=False, sort_keys=True)},
                      ],
                      "response_format": {"type": "json_object"},
                      "stream": False,
                  },
                  ensure_ascii=False,
              ).encode("utf-8")
              request = urllib.request.Request(
                  "https://api.deepseek.com/chat/completions",
                  data=body,
                  headers={**headers, "Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(request, timeout=180) as response:  # noqa: S310
                  raw = json.loads(response.read().decode("utf-8"))
              result = json.loads(raw["choices"][0]["message"]["content"])
              if not isinstance(result, dict) or result.get("decision") not in {
                  "RETRY",
                  "REPAIR",
                  "WAIT",
                  "STOP",
              }:
                  raise RuntimeError("DeepSeek control-sentinel response violated the contract")
              result["runtime_model"] = model
              return result


          def dispatch_supervisor(
              *,
              run_id: int,
              run: dict[str, Any],
              jobs: dict[str, Any],
              logs: dict[str, str],
              diagnosis: dict[str, Any],
          ) -> str:
              operation_id = f"control-sentinel-repair-{run_id}-{int(time.time())}"
              support_packet = {
                  "operation_id": operation_id,
                  "target_repository": REPO,
                  "failed_run_id": run_id,
                  "failed_workflow": "DeepSeek Control Plane",
                  "run": run,
                  "jobs": jobs,
                  "job_log_tails": logs,
                  "deepseek_diagnosis": diagnosis,
                  "request": (
                      "Repair the smallest persistent control-plane defect. Preserve the mandatory DeepSeek-first "
                      "entry, ticket redaction, independent rescue, bounded retries, and CI safety gates."
                  ),
              }
              github(
                  "POST",
                  f"/repos/{REPO}/actions/workflows/deepseek-supervisor.yml/dispatches",
                  {
                      "ref": "main",
                      "inputs": {
                          "operation_id": operation_id,
                          "original_operation_id": f"control-run-{run_id}",
                          "failed_run_id": str(run_id),
                          "receipt_comment_id": "",
                          "failure_class": "deepseek-control-plane-failure",
                          "support_packet_json": json.dumps(
                              support_packet,
                              ensure_ascii=False,
                              separators=(",", ":"),
                          ),
                          "retry_dispatch_json": "{}",
                      },
                  },
              )
              return operation_id


          try:
              run_id = int(required("SOURCE_RUN_ID"))
              run = github("GET", f"/repos/{REPO}/actions/runs/{run_id}")
              jobs = github("GET", f"/repos/{REPO}/actions/runs/{run_id}/jobs?per_page=100")
              logs: dict[str, str] = {}
              for job in jobs.get("jobs", [])[:10]:
                  try:
                      raw = github(
                          "GET",
                          f"/repos/{REPO}/actions/jobs/{job['id']}/logs",
                          binary=True,
                      )
                      logs[str(job["id"])] = raw.decode("utf-8", errors="replace")[-60000:]
                  except Exception as exc:  # noqa: BLE001
                      logs[str(job.get("id"))] = f"log retrieval failed: {exc}"

              diagnosis = call_deepseek(
                  {
                      "repository": REPO,
                      "run": run,
                      "jobs": jobs,
                      "job_log_tails": logs,
                  }
              )
              automatic_action = "DIAGNOSIS_ONLY"
              supervisor_operation_id = None
              if (
                  diagnosis.get("decision") == "REPAIR"
                  and diagnosis.get("failure_scope") == "CONTROL_REPOSITORY"
              ):
                  supervisor_operation_id = dispatch_supervisor(
                      run_id=run_id,
                      run=run,
                      jobs=jobs,
                      logs=logs,
                      diagnosis=diagnosis,
                  )
                  automatic_action = "DEEPSEEK_SUPERVISOR_DISPATCHED"
              elif diagnosis.get("decision") == "RETRY" and int(run.get("run_attempt", 1)) < 2:
                  github("POST", f"/repos/{REPO}/actions/runs/{run_id}/rerun-failed-jobs")
                  automatic_action = "FAILED_JOBS_RERUN_REQUESTED"

              output = {
                  "status": "CONTROL_FAILURE_ROUTED",
                  "source_run_id": run_id,
                  "diagnosis": diagnosis,
                  "automatic_action": automatic_action,
                  "supervisor_operation_id": supervisor_operation_id,
                  "generated_at": int(time.time()),
              }
          except Exception as exc:  # noqa: BLE001
              output = {
                  "status": "CONTROL_SENTINEL_FAILED",
                  "source_run_id": os.environ.get("SOURCE_RUN_ID"),
                  "error": f"{type(exc).__name__}: {exc}",
                  "generated_at": int(time.time()),
              }
          (OUT / "control-failure-diagnosis.json").write_text(
              json.dumps(output, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(output, ensure_ascii=False, indent=2, sort_keys=True))
          if output["status"] == "CONTROL_SENTINEL_FAILED":
              raise SystemExit(1)
          PY

      - name: Publish control-sentinel summary
        if: always()
        run: |
          if [[ -f control-sentinel-output/control-failure-diagnosis.json ]]; then
            echo '## DeepSeek control-plane failure diagnosis and routing' >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat control-sentinel-output/control-failure-diagnosis.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload control-sentinel evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "deepseek-control-sentinel-${{ github.event.workflow_run.id }}"
          path: control-sentinel-output/
          if-no-files-found: warn
          retention-days: 30
