name: Expert Team CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q expert_team scripts tests

      - name: Validate GPT Action OpenAPI contract
        run: |
          ruby <<'RUBY'
          require "yaml"
          d = YAML.load_file("gpt_action_openapi.yaml")
          raise "missing openapi" unless d["openapi"]

          schemas = d.dig("components", "schemas")
          raise "components.schemas must be an object" unless schemas.is_a?(Hash)

          ids = d.fetch("paths").values.flat_map { |p| p.values }.filter_map { |op| op.is_a?(Hash) ? op["operationId"] : nil }
          required = %w[
            getOpenRouterModels
            getExecutionPlanSchema
            getDeepSeekStewardPolicy
            dispatchExpertTeamOperation
            listExpertTeamRuns
            getExpertTeamRun
            getExpertTeamRunJobs
            listExpertTeamRunArtifacts
            getExpertTeamResult
            getDeepSeekStewardResult
            getExpertTeamOperationMetadata
            downloadExpertTeamArtifact
          ]
          missing = required - ids
          raise "missing operationIds: #{missing.join(',')}" unless missing.empty?

          dispatch = d.dig(
            "paths",
            "/repos/a15280020511/test2/actions/workflows/expert-team-production.yml/dispatches",
            "post",
            "requestBody",
            "content",
            "application/json",
            "schema",
            "properties",
            "inputs",
            "properties",
            "operation",
            "enum"
          )
          raise "deepseek_steward missing from operation enum" unless dispatch&.include?("deepseek_steward")

          errors = []
          walk = lambda do |node, path|
            case node
            when Hash
              type = node["type"]
              object_type = type == "object" || (type.is_a?(Array) && type.include?("object"))
              if object_type && !node.key?("properties")
                errors << "object schema missing properties at #{path.join('/')}"
              end
              node.each { |k, v| walk.call(v, path + [k.to_s]) }
            when Array
              node.each_with_index { |v, i| walk.call(v, path + [i.to_s]) }
            end
          end
          walk.call(d, [])
          raise errors.join("\n") unless errors.empty?

          puts "GPT Action OpenAPI strict contract OK"
          RUBY

      - name: Validate DeepSeek provider separation and hard stop
        run: |
          grep -F 'https://api.deepseek.com' expert_team/deepseek_official.py >/dev/null
          grep -F 'DEEPSEEK_API_KEY' expert_team/deepseek_official.py >/dev/null
          grep -F 'must never fall back to OpenRouter' DEEPSEEK_STEWARD.md >/dev/null
          grep -F 'DeepSeek unavailability is a hard stop' DEEPSEEK_STEWARD.md >/dev/null
          if grep -F 'create_model_client' expert_team/deepseek_steward.py >/dev/null; then
            echo "DeepSeek Steward must not use the OpenRouter expert client"
            exit 1
          fi
          if grep -F 'return DEFAULT_STEWARD_MODEL' expert_team/deepseek_official.py >/dev/null; then
            echo "DeepSeek model discovery must not fall back to a fixed model when the official API is unavailable"
            exit 1
          fi
          echo "DeepSeek provider separation and hard-stop policy OK"

      - name: Run offline contract tests
        run: python -m unittest discover -s tests -v

      - name: Run optional live OpenRouter smoke test
        env:
          PYTHONPATH: .
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_SMOKE_MODEL: openrouter/free
        run: python scripts/live_smoke_test.py

      - name: Run live official DeepSeek Steward smoke test
        env:
          PYTHONPATH: .
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/deepseek_steward_smoke_test.py

      - name: Upload smoke result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expert-team-smoke-result
          path: |
            artifacts/live_smoke_result.json
            artifacts/deepseek_steward_smoke_result.json
          if-no-files-found: warn
          retention-days: 7
