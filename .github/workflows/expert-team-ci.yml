name: Expert Team CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q expert_team scripts tests

      - name: Run offline contract tests
        run: python -m unittest discover -s tests -v

      - name: Run optional live OpenRouter smoke test
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_SMOKE_MODEL: openrouter/free
        run: python scripts/live_smoke_test.py

      - name: Upload smoke result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expert-team-smoke-result
          path: artifacts/live_smoke_result.json
          if-no-files-found: warn
          retention-days: 7
