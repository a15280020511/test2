name: Expert Team CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate dependency-free DeepSeek core before plugin install
        run: |
          python -m py_compile \
            expert_team/deepseek_official.py \
            expert_team/deepseek_steward.py \
            scripts/action_entrypoint.py \
            scripts/managed_operation.py \
            scripts/plugin_runner.py \
            scripts/verify_deepseek_entry.py \
            scripts/cross_repo_control.py
          python - <<'PY'
          from pathlib import Path
          from expert_team.deepseek_steward import run_deepseek_steward
          deps = [line.strip() for line in Path('requirements.txt').read_text().splitlines() if line.strip() and not line.lstrip().startswith('#')]
          if deps:
              raise SystemExit(f'permanent core unexpectedly has dependencies: {deps}')
          if not callable(run_deepseek_steward):
              raise SystemExit('DeepSeek Steward core is not independently importable')
          print('Dependency-free DeepSeek core OK')
          PY

      - name: Validate plugin manifests and cleanup contract
        run: |
          python -m json.tool plugins/expert-team/plugin.json >/dev/null
          grep -F 'cleanup": "always' plugins/expert-team/plugin.json >/dev/null
          grep -F 'shutil.rmtree(temp_root, ignore_errors=True)' scripts/plugin_runner.py >/dev/null
          grep -F '任务级临时插头' TOOL_PACKAGE_GUARDRAILS.md >/dev/null
          grep -F '预算先批准' DEEPSEEK_STEWARD.md >/dev/null
          echo 'Ephemeral plugin contract OK'

      - name: Install expert-team plug for this CI job only
        run: |
          python -m pip install --upgrade pip
          pip install -r plugins/expert-team/requirements.txt

      - name: Compile all Python sources with plug active
        run: python -m compileall -q expert_team scripts tests

      - name: Validate GPT Action OpenAPI contract
        run: ruby scripts/validate_action_schema.rb

      - name: Validate independent DeepSeek control plane
        run: ruby scripts/validate_control_schema.rb

      - name: Validate DeepSeek-first budget, receipt and review contract
        run: |
          grep -F 'ASSIST — mandatory first contact' expert_team/deepseek_steward.py >/dev/null
          grep -F 'Mode: REVIEW' expert_team/deepseek_steward.py >/dev/null
          grep -F 'budget_options' expert_team/deepseek_steward.py >/dev/null
          grep -F 'approved_by_user' expert_team/dynamic_team.py >/dev/null
          grep -F 'max_output_tokens_per_call' expert_team/dynamic_team.py >/dev/null
          grep -F 'deepseek_final_review' scripts/action_entrypoint.py >/dev/null
          grep -F 'publication_status' scripts/action_entrypoint.py >/dev/null
          grep -F 'version": "2' expert_team/execution_plan_form.json >/dev/null
          python -m json.tool budget_approval_receipt.template.json >/dev/null
          grep -F 'web_gpt_after_user_budget_selection' budget_approval_receipt.template.json >/dev/null
          grep -F 'budget receipt does not exactly match' scripts/verify_deepseek_entry.py >/dev/null
          grep -F 'execute_team requires a durable Web GPT receipt' .github/workflows/expert-team-production.yml >/dev/null
          grep -F 'issues/comments/${RECEIPT_COMMENT_ID}' .github/workflows/expert-team-production.yml >/dev/null
          echo 'DeepSeek entry, durable budget approval and final review contract OK'

      - name: Validate provider separation and hard stop
        run: |
          grep -F 'https://api.deepseek.com' expert_team/deepseek_official.py >/dev/null
          grep -F 'DEEPSEEK_API_KEY' expert_team/deepseek_official.py >/dev/null
          grep -F '不得切换到OpenRouter' DEEPSEEK_STEWARD.md >/dev/null
          if grep -F 'create_model_client' expert_team/deepseek_steward.py >/dev/null; then
            echo 'DeepSeek Steward must not use the OpenRouter expert client'
            exit 1
          fi
          if grep -F 'create_model_client' expert_team/deepseek_top_supervisor.py >/dev/null; then
            echo 'DeepSeek top supervisor must not use the OpenRouter expert client'
            exit 1
          fi
          echo 'DeepSeek provider separation OK'

      - name: Validate managed repair and temporary plugin routing
        run: |
          grep -F 'scripts.plugin_runner' scripts/managed_operation.py >/dev/null
          grep -F 'PLUGIN_OPERATIONS' scripts/managed_operation.py >/dev/null
          grep -F 'one repair cycle and one retry' scripts/managed_operation.py >/dev/null
          grep -F '"repairing"' scripts/managed_operation.py >/dev/null
          grep -F '"retrying"' scripts/managed_operation.py >/dev/null
          grep -F 'Validate permanent core and plug manifests' .github/workflows/expert-team-production.yml >/dev/null
          if grep -F 'pip install -r requirements.txt' .github/workflows/expert-team-production.yml >/dev/null; then
            echo 'Production must not install permanent third-party requirements'
            exit 1
          fi
          echo 'Managed repair and temporary plugin routing OK'

      - name: Validate durable receipt and top DeepSeek supervisor
        run: |
          grep -F 'version: 1.6.0' gpt_action_openapi.yaml >/dev/null
          grep -F 'operationId: createOperationReceipt' gpt_action_openapi.yaml >/dev/null
          grep -F 'Escalate failed production run to DeepSeek Top Supervisor' .github/workflows/expert-team-production.yml >/dev/null
          grep -F 'deepseek-supervisor.yml/dispatches' .github/workflows/expert-team-production.yml >/dev/null
          grep -F 'group: deepseek-top-supervisor' .github/workflows/deepseek-supervisor.yml >/dev/null
          grep -F 'scripts.top_supervisor_entrypoint' .github/workflows/deepseek-supervisor.yml >/dev/null
          grep -F 'scripts.supervisor_resume' .github/workflows/deepseek-supervisor.yml >/dev/null
          grep -F 'operationId: dispatchDeepSeekSupervisor' gpt_action_openapi.yaml >/dev/null
          echo 'Durable receipt and top supervisor contract OK'

      - name: Validate permanent operation status control plane
        run: |
          grep -F 'operationId: getCurrentOperationStatus' gpt_action_openapi.yaml >/dev/null
          grep -F 'CURRENT_STATUS_PATH' scripts/publish_operation_status.py >/dev/null
          git fetch origin runtime-results
          git show origin/runtime-results:runtime_results/current_operation_status.json > /tmp/current_operation_status.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('/tmp/current_operation_status.json').read_text())
          required = {'schema_version','operation_id','operation','status','run_id','receipt_comment_id','supervisor_for_operation_id','result_ready','result_published','repair_status','updated_at'}
          missing = required - payload.keys()
          if missing:
              raise SystemExit(f'missing permanent status fields: {sorted(missing)}')
          if payload['status'] not in {'idle','running','repairing','retrying','success','STOP','failure'}:
              raise SystemExit(f"invalid permanent status: {payload['status']}")
          PY

      - name: Run offline contract tests
        run: |
          mkdir -p artifacts
          set +e
          python -m unittest discover -s tests -v 2>&1 | tee artifacts/offline_tests.log
          status=${PIPESTATUS[0]}
          set -e
          exit $status

      - name: Run optional live OpenRouter smoke test
        env:
          PYTHONPATH: .
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_SMOKE_MODEL: openrouter/free
        run: python scripts/live_smoke_test.py

      - name: Run live official DeepSeek Steward smoke test
        env:
          PYTHONPATH: .
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/deepseek_steward_smoke_test.py

      - name: Upload smoke result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expert-team-smoke-result
          path: |
            artifacts/offline_tests.log
            artifacts/live_smoke_result.json
            artifacts/deepseek_steward_smoke_result.json
          if-no-files-found: warn
          retention-days: 30
