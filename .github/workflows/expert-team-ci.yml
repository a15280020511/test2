name: Expert Team CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q expert_team scripts tests

      - name: Validate GPT Action OpenAPI contract
        run: ruby scripts/validate_action_schema.rb

      - name: Validate DeepSeek provider separation and hard stop
        run: |
          grep -F 'https://api.deepseek.com' expert_team/deepseek_official.py >/dev/null
          grep -F 'DEEPSEEK_API_KEY' expert_team/deepseek_official.py >/dev/null
          grep -F 'must not route Steward requests through OpenRouter' DEEPSEEK_STEWARD.md >/dev/null
          grep -F 'DeepSeek unavailability is a hard stop' DEEPSEEK_STEWARD.md >/dev/null
          if grep -F 'create_model_client' expert_team/deepseek_steward.py >/dev/null; then
            echo "DeepSeek Steward must not use the OpenRouter expert client"
            exit 1
          fi
          if grep -F 'create_model_client' expert_team/deepseek_top_supervisor.py >/dev/null; then
            echo "DeepSeek top supervisor must not use the OpenRouter expert client"
            exit 1
          fi
          if grep -F 'return DEFAULT_STEWARD_MODEL' expert_team/deepseek_official.py >/dev/null; then
            echo "DeepSeek model discovery must not use a fixed-model connectivity fallback"
            exit 1
          fi
          echo "DeepSeek provider separation and hard-stop policy OK"

      - name: Validate internal automatic repair loop contract
        run: |
          grep -F 'scripts.managed_operation' .github/workflows/expert-team-production.yml >/dev/null
          grep -F 'scripts.repair_delivery' .github/workflows/expert-team-production.yml >/dev/null
          grep -F 'scripts.publish_runtime_result' .github/workflows/expert-team-production.yml >/dev/null
          grep -F 'one repair cycle and one retry' scripts/managed_operation.py >/dev/null
          grep -F 'operationId: getAutoRepairResult' gpt_action_openapi.yaml >/dev/null
          grep -F '"repairing"' scripts/managed_operation.py >/dev/null
          grep -F '"retrying"' scripts/managed_operation.py >/dev/null
          echo "Internal DeepSeek repair loop contract OK"

      - name: Validate durable receipt and top DeepSeek supervisor
        run: |
          grep -F 'version: 1.6.0' gpt_action_openapi.yaml >/dev/null
          grep -F 'operationId: createOperationReceipt' gpt_action_openapi.yaml >/dev/null
          grep -F 'issues/15/comments' gpt_action_openapi.yaml >/dev/null
          grep -F 'receipt_comment_id:' .github/workflows/expert-team-production.yml >/dev/null
          grep -F 'run-name: expert-' .github/workflows/expert-team-production.yml >/dev/null
          grep -F 'Escalate failed production run to DeepSeek Top Supervisor' .github/workflows/expert-team-production.yml >/dev/null
          grep -F 'deepseek-supervisor.yml/dispatches' .github/workflows/expert-team-production.yml >/dev/null
          grep -F 'group: deepseek-top-supervisor' .github/workflows/deepseek-supervisor.yml >/dev/null
          grep -F 'Run highest-level DeepSeek technical supervisor' .github/workflows/deepseek-supervisor.yml >/dev/null
          grep -F 'scripts.top_supervisor_entrypoint' .github/workflows/deepseek-supervisor.yml >/dev/null
          grep -F 'scripts.enrich_supervisor_packet' .github/workflows/deepseek-supervisor.yml >/dev/null
          grep -F 'scripts.supervisor_resume' .github/workflows/deepseek-supervisor.yml >/dev/null
          grep -F 'retry_operation_overrides' expert_team/deepseek_top_supervisor.py >/dev/null
          grep -F 'operationId: dispatchDeepSeekSupervisor' gpt_action_openapi.yaml >/dev/null
          grep -F 'second consecutive read' ACTION_RECOVERY.md >/dev/null
          grep -F 'highest technical control layer' DEEPSEEK_STEWARD.md >/dev/null
          echo "Durable receipt and DeepSeek top-supervisor contract OK"

      - name: Validate permanent operation status control plane
        run: |
          grep -F 'operationId: getCurrentOperationStatus' gpt_action_openapi.yaml >/dev/null
          grep -F 'runtime_results/current_operation_status.json' gpt_action_openapi.yaml >/dev/null
          grep -F 'CURRENT_STATUS_PATH' scripts/publish_operation_status.py >/dev/null
          grep -F 'result_published' scripts/publish_operation_status.py >/dev/null
          grep -F 'receipt_comment_id' scripts/publish_operation_status.py >/dev/null
          grep -F 'supervisor_for_operation_id' scripts/publish_operation_status.py >/dev/null
          if grep -F 'operationId: getOperationStatus' gpt_action_openapi.yaml >/dev/null; then
            echo "Per-operation status must not remain the primary Action control plane"
            exit 1
          fi
          if grep -F 'operationId: listExpertTeamRuns' gpt_action_openapi.yaml >/dev/null; then
            echo "listExpertTeamRuns must not be exposed as the normal control plane"
            exit 1
          fi
          git fetch origin runtime-results
          git show origin/runtime-results:runtime_results/current_operation_status.json > /tmp/current_operation_status.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('/tmp/current_operation_status.json').read_text())
          required = {'schema_version','operation_id','operation','status','run_id','receipt_comment_id','supervisor_for_operation_id','result_ready','result_published','repair_status','updated_at'}
          missing = required - payload.keys()
          if missing:
              raise SystemExit(f'missing permanent status fields: {sorted(missing)}')
          if payload['status'] not in {'idle','running','repairing','retrying','success','STOP','failure'}:
              raise SystemExit(f"invalid permanent status: {payload['status']}")
          print('Permanent current-operation status file exists and is valid')
          PY
          echo "Permanent operation status control plane OK"

      - name: Validate tool package guardrails
        run: |
          grep -F 'Upstream package maintenance belongs to the upstream maintainers' TOOL_PACKAGE_GUARDRAILS.md >/dev/null
          grep -F 'Do not build a second package-maintenance platform inside `test2`' TOOL_PACKAGE_GUARDRAILS.md >/dev/null
          grep -F 'DeepSeek Steward owns **repository-side compatibility and integration problems**' TOOL_PACKAGE_GUARDRAILS.md >/dev/null
          grep -F 'External tool packages are governed by `TOOL_PACKAGE_GUARDRAILS.md`' DEEPSEEK_STEWARD.md >/dev/null
          grep -F 'DeepSeek Steward owns only the `test2`-side integration' DEEPSEEK_STEWARD.md >/dev/null
          echo "Tool package guardrail policy OK"

      - name: Run offline contract tests
        run: python -m unittest discover -s tests -v

      - name: Run optional live OpenRouter smoke test
        env:
          PYTHONPATH: .
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_SMOKE_MODEL: openrouter/free
        run: python scripts/live_smoke_test.py

      - name: Run live official DeepSeek Steward smoke test
        env:
          PYTHONPATH: .
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/deepseek_steward_smoke_test.py

      - name: Upload smoke result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expert-team-smoke-result
          path: |
            artifacts/live_smoke_result.json
            artifacts/deepseek_steward_smoke_result.json
          if-no-files-found: warn
          retention-days: 7
