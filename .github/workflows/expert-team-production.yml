name: Expert Team Production

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: Unique ID generated by Web GPT for this request
        required: true
        type: string
      operation:
        description: Read model intelligence or execute a Web-GPT-authored team plan
        required: true
        type: choice
        options:
          - model_intelligence
          - execute_team
      plan_json:
        description: Execution Plan JSON; required only for execute_team
        required: false
        default: "{}"
        type: string
      ranking_limit:
        description: Number of models kept per ranking view for model_intelligence
        required: false
        default: "20"
        type: string

permissions:
  contents: write

concurrency:
  group: expert-team-production
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute requested operation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PLAN_JSON: ${{ inputs.plan_json }}
        run: |
          python -m scripts.action_entrypoint \
            --operation "${{ inputs.operation }}" \
            --operation-id "${{ inputs.operation_id }}" \
            --plan-json "$PLAN_JSON" \
            --ranking-limit "${{ inputs.ranking_limit }}"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expert-team-${{ inputs.operation_id }}
          path: artifacts/${{ inputs.operation_id }}/
          if-no-files-found: error
          retention-days: 7

      - name: Publish GPT-readable JSON result
        if: always()
        env:
          OPERATION_ID: ${{ inputs.operation_id }}
          OPERATION: ${{ inputs.operation }}
        run: |
          set -euo pipefail

          SAFE_ID="$(python - <<'PY'
          import os
          value = os.environ['OPERATION_ID']
          cleaned = ''.join(ch for ch in value.strip() if ch.isalnum() or ch in {'-', '_', '.'})
          if not cleaned:
              raise SystemExit('operation_id has no safe characters')
          print(cleaned[:120])
          PY
          )"

          SOURCE_DIR="artifacts/${SAFE_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin runtime-results
          rm -rf /tmp/test2-runtime-results
          git worktree add /tmp/test2-runtime-results origin/runtime-results

          DEST_DIR="/tmp/test2-runtime-results/runtime_results/${SAFE_ID}"
          mkdir -p "$DEST_DIR"

          if [ -f "${SOURCE_DIR}/metadata.json" ]; then
            cp "${SOURCE_DIR}/metadata.json" "${DEST_DIR}/metadata.json"
          fi

          if [ -f "${SOURCE_DIR}/expert_team_result.json" ]; then
            cp "${SOURCE_DIR}/expert_team_result.json" "${DEST_DIR}/expert_team_result.json"
          fi

          if [ -f "${SOURCE_DIR}/model_intelligence_compact.json" ]; then
            cp "${SOURCE_DIR}/model_intelligence_compact.json" "${DEST_DIR}/model_intelligence.json"
            cp "${SOURCE_DIR}/model_intelligence_compact.json" "/tmp/test2-runtime-results/runtime_results/model_intelligence_latest.json"
          fi

          git -C /tmp/test2-runtime-results add runtime_results
          if git -C /tmp/test2-runtime-results diff --cached --quiet; then
            echo "No runtime result changes to publish"
            exit 0
          fi

          git -C /tmp/test2-runtime-results commit -m "Publish runtime result ${SAFE_ID}"
          git -C /tmp/test2-runtime-results push origin HEAD:runtime-results
