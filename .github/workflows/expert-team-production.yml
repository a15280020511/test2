name: Expert Team Production
run-name: expert-${{ inputs.operation_id }}-${{ inputs.operation }}

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: Unique ID generated by Web GPT for this request
        required: true
        type: string
      operation:
        description: Model intelligence, expert execution, or DeepSeek Steward assistance
        required: true
        type: choice
        options:
          - model_intelligence
          - execute_team
          - deepseek_steward
      receipt_comment_id:
        description: Durable receipt comment ID created in control issue 15 before dispatch
        required: true
        type: string
      plan_json:
        description: Execution Plan JSON; required only for execute_team
        required: false
        default: "{}"
        type: string
      ranking_limit:
        description: Number of models kept per ranking view for model_intelligence
        required: false
        default: "20"
        type: string
      steward_mode:
        description: Main workflow Steward mode; use ASSIST here and top supervisor for REPAIR
        required: false
        default: ASSIST
        type: choice
        options:
          - ASSIST
          - REPAIR
      support_packet_json:
        description: JSON Support Packet for DeepSeek Steward
        required: false
        default: "{}"
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write
  issues: read

concurrency:
  group: expert-team-production
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Publish running operation status
        env:
          PYTHONPATH: .
        run: |
          python -m scripts.publish_operation_status \
            --operation-id "${{ inputs.operation_id }}" \
            --operation "${{ inputs.operation }}" \
            --receipt-comment-id "${{ inputs.receipt_comment_id }}" \
            --phase start

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare repository context
        run: git fetch origin runtime-results || true

      - name: Execute managed operation with automatic DeepSeek repair
        env:
          PYTHONPATH: .
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PLAN_JSON: ${{ inputs.plan_json }}
          SUPPORT_PACKET_JSON: ${{ inputs.support_packet_json }}
          RECEIPT_COMMENT_ID: ${{ inputs.receipt_comment_id }}
        run: |
          python -m scripts.managed_operation \
            --operation "${{ inputs.operation }}" \
            --operation-id "${{ inputs.operation_id }}" \
            --plan-json "$PLAN_JSON" \
            --ranking-limit "${{ inputs.ranking_limit }}" \
            --steward-mode "${{ inputs.steward_mode }}" \
            --support-packet-json "$SUPPORT_PACKET_JSON"

      - name: Deliver verified DeepSeek repair
        env:
          PYTHONPATH: .
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: python -m scripts.repair_delivery --operation-id "${{ inputs.operation_id }}"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expert-team-${{ inputs.operation_id }}
          path: artifacts/${{ inputs.operation_id }}/
          if-no-files-found: error
          retention-days: 7

      - name: Publish GPT-readable JSON result
        id: publish_result
        if: always()
        env:
          PYTHONPATH: .
        run: python -m scripts.publish_runtime_result --operation-id "${{ inputs.operation_id }}"

      - name: Publish final operation status
        if: always()
        env:
          PYTHONPATH: .
        run: |
          python -m scripts.publish_operation_status \
            --operation-id "${{ inputs.operation_id }}" \
            --operation "${{ inputs.operation }}" \
            --receipt-comment-id "${{ inputs.receipt_comment_id }}" \
            --phase final \
            --job-status "${{ job.status }}" \
            --result-published "${{ steps.publish_result.outcome }}"

  escalate_to_deepseek:
    name: Escalate failed production run to DeepSeek Top Supervisor
    needs: run
    if: ${{ always() && needs.run.result == 'failure' && inputs.operation != 'deepseek_steward' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispatch independent DeepSeek top supervisor
        env:
          GH_TOKEN: ${{ github.token }}
          ORIGINAL_OPERATION_ID: ${{ inputs.operation_id }}
          ORIGINAL_OPERATION: ${{ inputs.operation }}
          ORIGINAL_RECEIPT_COMMENT_ID: ${{ inputs.receipt_comment_id }}
          ORIGINAL_PLAN_JSON: ${{ inputs.plan_json }}
          ORIGINAL_RANKING_LIMIT: ${{ inputs.ranking_limit }}
          ORIGINAL_STEWARD_MODE: ${{ inputs.steward_mode }}
          ORIGINAL_SUPPORT_PACKET_JSON: ${{ inputs.support_packet_json }}
        run: |
          SUPERVISOR_ID="supervisor-${ORIGINAL_OPERATION_ID}-${GITHUB_RUN_ID}"
          RETRY_DISPATCH_JSON=$(jq -cn \
            --arg operation_id "$ORIGINAL_OPERATION_ID" \
            --arg operation "$ORIGINAL_OPERATION" \
            --arg receipt_comment_id "$ORIGINAL_RECEIPT_COMMENT_ID" \
            --arg plan_json "$ORIGINAL_PLAN_JSON" \
            --arg ranking_limit "$ORIGINAL_RANKING_LIMIT" \
            --arg steward_mode "$ORIGINAL_STEWARD_MODE" \
            --arg support_packet_json "$ORIGINAL_SUPPORT_PACKET_JSON" \
            '{ref:"main",inputs:{operation_id:$operation_id,operation:$operation,receipt_comment_id:$receipt_comment_id,plan_json:$plan_json,ranking_limit:$ranking_limit,steward_mode:$steward_mode,support_packet_json:$support_packet_json}}')
          SUPPORT_PACKET_JSON=$(jq -cn \
            --arg operation_id "$ORIGINAL_OPERATION_ID" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg operation "$ORIGINAL_OPERATION" \
            --arg receipt_comment_id "$ORIGINAL_RECEIPT_COMMENT_ID" \
            '{operation_id:$operation_id,mode:"REPAIR",request:"Top-level supervisor: diagnose and recover a failed production workflow, including failures outside managed_operation.",current_state:"Expert Team Production workflow failed.",failure_location:"production workflow or one of its infrastructure steps",error_type:"ProductionWorkflowFailure",run_id:$run_id,operation:$operation,receipt_comment_id:$receipt_comment_id,constraints:["Use DeepSeek official API only","Never fall back to OpenRouter","Repair repository-side faults when evidence supports them","Resume or redispatch the original operation at most once"],requested_outcome:"Restore repository operation and safely resume the original task."}')
          PAYLOAD=$(jq -cn \
            --arg operation_id "$SUPERVISOR_ID" \
            --arg original_operation_id "$ORIGINAL_OPERATION_ID" \
            --arg failed_run_id "$GITHUB_RUN_ID" \
            --arg receipt_comment_id "$ORIGINAL_RECEIPT_COMMENT_ID" \
            --arg failure_class "workflow_failure" \
            --arg support_packet_json "$SUPPORT_PACKET_JSON" \
            --arg retry_dispatch_json "$RETRY_DISPATCH_JSON" \
            '{ref:"main",inputs:{operation_id:$operation_id,original_operation_id:$original_operation_id,failed_run_id:$failed_run_id,receipt_comment_id:$receipt_comment_id,failure_class:$failure_class,support_packet_json:$support_packet_json,retry_dispatch_json:$retry_dispatch_json}}')
          echo "$PAYLOAD" | gh api \
            --method POST \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/deepseek-supervisor.yml/dispatches" \
            --input -
