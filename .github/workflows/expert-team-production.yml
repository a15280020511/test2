name: Expert Team Production
run-name: expert-${{ inputs.operation_id }}-${{ inputs.operation }}

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: Unique ID generated by Web GPT for this request
        required: true
        type: string
      operation:
        description: Model intelligence, expert execution, or independent DeepSeek service
        required: true
        type: choice
        options:
          - model_intelligence
          - execute_team
          - deepseek_steward
      receipt_comment_id:
        description: Durable receipt comment ID; mandatory for execute_team and must contain the user's approved budget JSON
        required: false
        default: ""
        type: string
      plan_json:
        description: Version 2 Execution Plan JSON with DeepSeek entry and user-approved budget
        required: false
        default: "{}"
        type: string
      ranking_limit:
        description: Number of models kept per ranking view for model_intelligence
        required: false
        default: "20"
        type: string
      steward_mode:
        description: ASSIST is first entry, REVIEW is publication audit, REPAIR is technical repair
        required: false
        default: ASSIST
        type: choice
        options:
          - ASSIST
          - REVIEW
          - REPAIR
      support_packet_json:
        description: JSON Support Packet for DeepSeek Steward
        required: false
        default: "{}"
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write
  issues: write

concurrency:
  group: expert-team-production
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      receipt_comment_id: ${{ steps.receipt.outputs.receipt_comment_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python control core
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure durable operation and budget receipt
        id: receipt
        env:
          GH_TOKEN: ${{ github.token }}
          PROVIDED_RECEIPT_COMMENT_ID: ${{ inputs.receipt_comment_id }}
          OPERATION_ID: ${{ inputs.operation_id }}
          OPERATION: ${{ inputs.operation }}
        run: |
          if [ -n "$PROVIDED_RECEIPT_COMMENT_ID" ]; then
            echo "receipt_comment_id=$PROVIDED_RECEIPT_COMMENT_ID" >> "$GITHUB_OUTPUT"
            echo "receipt_source=provided" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$OPERATION" = "execute_team" ]; then
            echo "execute_team requires a durable Web GPT receipt created after the user selects a budget" >&2
            exit 1
          fi
          RECEIPT_BODY=$(jq -cn \
            --arg operation_id "$OPERATION_ID" \
            --arg operation "$OPERATION" \
            --arg run_id "$GITHUB_RUN_ID" \
            '{operation_id:$operation_id,operation:$operation,task_label:"auto-created by production workflow",run_id:$run_id,source:"server-side-fallback"}')
          RESPONSE=$(gh api --method POST "/repos/${GITHUB_REPOSITORY}/issues/15/comments" -f body="$RECEIPT_BODY")
          RECEIPT_ID=$(printf '%s' "$RESPONSE" | jq -r '.id // empty')
          if [ -z "$RECEIPT_ID" ]; then
            echo "Durable receipt creation returned no comment id" >&2
            exit 1
          fi
          echo "receipt_comment_id=$RECEIPT_ID" >> "$GITHUB_OUTPUT"
          echo "receipt_source=server-side-fallback" >> "$GITHUB_OUTPUT"

      - name: Publish running operation status
        env:
          PYTHONPATH: .
        run: |
          python -m scripts.publish_operation_status \
            --operation-id "${{ inputs.operation_id }}" \
            --operation "${{ inputs.operation }}" \
            --receipt-comment-id "${{ steps.receipt.outputs.receipt_comment_id }}" \
            --phase start

      - name: Validate permanent core and plug manifests
        run: |
          python -m py_compile \
            scripts/action_entrypoint.py \
            scripts/managed_operation.py \
            scripts/plugin_runner.py \
            scripts/verify_deepseek_entry.py \
            expert_team/deepseek_official.py \
            expert_team/deepseek_steward.py
          python -m json.tool plugins/expert-team/plugin.json >/dev/null
          test -s plugins/expert-team/requirements.txt
          echo "No third-party package is installed into the permanent control environment."

      - name: Prepare repository context
        run: git fetch origin runtime-results || true

      - name: Verify DeepSeek entry and durable user budget approval
        if: ${{ inputs.operation == 'execute_team' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN_JSON: ${{ inputs.plan_json }}
          RECEIPT_COMMENT_ID: ${{ steps.receipt.outputs.receipt_comment_id }}
        run: |
          gh api "/repos/${GITHUB_REPOSITORY}/issues/comments/${RECEIPT_COMMENT_ID}" \
            --jq '.body' > /tmp/budget-approval-receipt.json
          python -m scripts.verify_deepseek_entry \
            --plan-json "$PLAN_JSON" \
            --operation-id "${{ inputs.operation_id }}" \
            --receipt-body-file /tmp/budget-approval-receipt.json \
            --receipt-comment-id "$RECEIPT_COMMENT_ID"

      - name: Execute managed operation with automatic DeepSeek repair
        env:
          PYTHONPATH: .
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PLAN_JSON: ${{ inputs.plan_json }}
          SUPPORT_PACKET_JSON: ${{ inputs.support_packet_json }}
          RECEIPT_COMMENT_ID: ${{ steps.receipt.outputs.receipt_comment_id }}
        run: |
          python -m scripts.managed_operation \
            --operation "${{ inputs.operation }}" \
            --operation-id "${{ inputs.operation_id }}" \
            --plan-json "$PLAN_JSON" \
            --ranking-limit "${{ inputs.ranking_limit }}" \
            --steward-mode "${{ inputs.steward_mode }}" \
            --support-packet-json "$SUPPORT_PACKET_JSON"

      - name: Deliver verified DeepSeek repair
        env:
          PYTHONPATH: .
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: python -m scripts.repair_delivery --operation-id "${{ inputs.operation_id }}"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expert-team-${{ inputs.operation_id }}
          path: artifacts/${{ inputs.operation_id }}/
          if-no-files-found: error
          retention-days: 30

      - name: Publish GPT-readable JSON result
        id: publish_result
        if: always()
        env:
          PYTHONPATH: .
        run: python -m scripts.publish_runtime_result --operation-id "${{ inputs.operation_id }}"

      - name: Publish final operation status
        if: always()
        env:
          PYTHONPATH: .
        run: |
          python -m scripts.publish_operation_status \
            --operation-id "${{ inputs.operation_id }}" \
            --operation "${{ inputs.operation }}" \
            --receipt-comment-id "${{ steps.receipt.outputs.receipt_comment_id }}" \
            --phase final \
            --job-status "${{ job.status }}" \
            --result-published "${{ steps.publish_result.outcome }}"

  escalate_to_deepseek:
    name: Escalate failed production run to DeepSeek Top Supervisor
    needs: run
    if: ${{ always() && needs.run.result == 'failure' && inputs.operation != 'deepseek_steward' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispatch independent DeepSeek top supervisor
        env:
          GH_TOKEN: ${{ github.token }}
          ORIGINAL_OPERATION_ID: ${{ inputs.operation_id }}
          ORIGINAL_OPERATION: ${{ inputs.operation }}
          ORIGINAL_RECEIPT_COMMENT_ID: ${{ needs.run.outputs.receipt_comment_id || inputs.receipt_comment_id }}
          ORIGINAL_PLAN_JSON: ${{ inputs.plan_json }}
          ORIGINAL_RANKING_LIMIT: ${{ inputs.ranking_limit }}
          ORIGINAL_STEWARD_MODE: ${{ inputs.steward_mode }}
          ORIGINAL_SUPPORT_PACKET_JSON: ${{ inputs.support_packet_json }}
        run: |
          SUPERVISOR_ID="supervisor-${ORIGINAL_OPERATION_ID}-${GITHUB_RUN_ID}"
          RETRY_DISPATCH_JSON=$(jq -cn \
            --arg operation_id "$ORIGINAL_OPERATION_ID" \
            --arg operation "$ORIGINAL_OPERATION" \
            --arg receipt_comment_id "$ORIGINAL_RECEIPT_COMMENT_ID" \
            --arg plan_json "$ORIGINAL_PLAN_JSON" \
            --arg ranking_limit "$ORIGINAL_RANKING_LIMIT" \
            --arg steward_mode "$ORIGINAL_STEWARD_MODE" \
            --arg support_packet_json "$ORIGINAL_SUPPORT_PACKET_JSON" \
            '{ref:"main",inputs:{operation_id:$operation_id,operation:$operation,receipt_comment_id:$receipt_comment_id,plan_json:$plan_json,ranking_limit:$ranking_limit,steward_mode:$steward_mode,support_packet_json:$support_packet_json}}')
          SUPPORT_PACKET_JSON=$(jq -cn \
            --arg operation_id "$ORIGINAL_OPERATION_ID" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg operation "$ORIGINAL_OPERATION" \
            --arg receipt_comment_id "$ORIGINAL_RECEIPT_COMMENT_ID" \
            --arg original_plan_json "$ORIGINAL_PLAN_JSON" \
            --arg original_ranking_limit "$ORIGINAL_RANKING_LIMIT" \
            --arg original_support_packet_json "$ORIGINAL_SUPPORT_PACKET_JSON" \
            '{operation_id:$operation_id,mode:"REPAIR",failure_class:"workflow_failure",request:"Diagnose and recover a failed production workflow while preserving the independent DeepSeek core, durable budget receipt, and ephemeral-plugin boundary.",current_state:"Expert Team Production workflow failed.",failure_location:"production workflow or infrastructure step",error_type:"ProductionWorkflowFailure",run_id:$run_id,operation:$operation,receipt_comment_id:$receipt_comment_id,original_plan_json:$original_plan_json,original_ranking_limit:$original_ranking_limit,original_support_packet_json:$original_support_packet_json,constraints:["Use DeepSeek official API only","Never fall back to OpenRouter for Steward","Do not maintain or fork upstream plugins","Never fabricate or bypass user budget approval","Resume at most once"],requested_outcome:"Restore repository integration and safely resume only when the existing budget approval remains valid."}')
          PAYLOAD=$(jq -cn \
            --arg operation_id "$SUPERVISOR_ID" \
            --arg original_operation_id "$ORIGINAL_OPERATION_ID" \
            --arg failed_run_id "$GITHUB_RUN_ID" \
            --arg receipt_comment_id "$ORIGINAL_RECEIPT_COMMENT_ID" \
            --arg failure_class "workflow_failure" \
            --arg support_packet_json "$SUPPORT_PACKET_JSON" \
            --arg retry_dispatch_json "$RETRY_DISPATCH_JSON" \
            '{ref:"main",inputs:{operation_id:$operation_id,original_operation_id:$original_operation_id,failed_run_id:$failed_run_id,receipt_comment_id:$receipt_comment_id,failure_class:$failure_class,support_packet_json:$support_packet_json,retry_dispatch_json:$retry_dispatch_json}}')
          echo "$PAYLOAD" | gh api \
            --method POST \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/deepseek-supervisor.yml/dispatches" \
            --input -
