name: Expert Team Production

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: Unique ID generated by Web GPT for this request
        required: true
        type: string
      operation:
        description: Model intelligence, expert execution, or DeepSeek Steward service
        required: true
        type: choice
        options:
          - model_intelligence
          - execute_team
          - deepseek_steward
      plan_json:
        description: Execution Plan JSON; required only for execute_team
        required: false
        default: "{}"
        type: string
      ranking_limit:
        description: Number of models kept per ranking view for model_intelligence
        required: false
        default: "20"
        type: string
      steward_mode:
        description: DeepSeek Steward mode; ASSIST advises Web GPT, REPAIR repairs repository faults
        required: false
        default: ASSIST
        type: choice
        options:
          - ASSIST
          - REPAIR
      support_packet_json:
        description: JSON Support Packet for DeepSeek Steward
        required: false
        default: "{}"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: expert-team-production
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Publish running operation status
        env:
          PYTHONPATH: .
        run: |
          python -m scripts.publish_operation_status \
            --operation-id "${{ inputs.operation_id }}" \
            --operation "${{ inputs.operation }}" \
            --phase start

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare repository context
        run: git fetch origin runtime-results || true

      - name: Execute managed operation with automatic DeepSeek repair
        env:
          PYTHONPATH: .
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PLAN_JSON: ${{ inputs.plan_json }}
          SUPPORT_PACKET_JSON: ${{ inputs.support_packet_json }}
        run: |
          python -m scripts.managed_operation \
            --operation "${{ inputs.operation }}" \
            --operation-id "${{ inputs.operation_id }}" \
            --plan-json "$PLAN_JSON" \
            --ranking-limit "${{ inputs.ranking_limit }}" \
            --steward-mode "${{ inputs.steward_mode }}" \
            --support-packet-json "$SUPPORT_PACKET_JSON"

      - name: Deliver verified DeepSeek repair
        env:
          PYTHONPATH: .
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: python -m scripts.repair_delivery --operation-id "${{ inputs.operation_id }}"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expert-team-${{ inputs.operation_id }}
          path: artifacts/${{ inputs.operation_id }}/
          if-no-files-found: error
          retention-days: 7

      - name: Publish GPT-readable JSON result
        if: always()
        env:
          PYTHONPATH: .
        run: python -m scripts.publish_runtime_result --operation-id "${{ inputs.operation_id }}"

      - name: Publish final operation status
        if: always()
        env:
          PYTHONPATH: .
        run: |
          python -m scripts.publish_operation_status \
            --operation-id "${{ inputs.operation_id }}" \
            --operation "${{ inputs.operation }}" \
            --phase final \
            --job-status "${{ job.status }}"
