name: Expert Team Production

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: Unique ID generated by Web GPT for this request
        required: true
        type: string
      operation:
        description: Read model intelligence or execute a Web-GPT-authored team plan
        required: true
        type: choice
        options:
          - model_intelligence
          - execute_team
      plan_json:
        description: Execution Plan JSON; required only for execute_team
        required: false
        default: "{}"
        type: string
      ranking_limit:
        description: Number of models kept per ranking view for model_intelligence
        required: false
        default: "20"
        type: string

permissions:
  contents: read

concurrency:
  group: expert-team-production
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute requested operation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PLAN_JSON: ${{ inputs.plan_json }}
        run: |
          python -m scripts.action_entrypoint \
            --operation "${{ inputs.operation }}" \
            --operation-id "${{ inputs.operation_id }}" \
            --plan-json "$PLAN_JSON" \
            --ranking-limit "${{ inputs.ranking_limit }}"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expert-team-${{ inputs.operation_id }}
          path: artifacts/${{ inputs.operation_id }}/
          if-no-files-found: error
          retention-days: 7
