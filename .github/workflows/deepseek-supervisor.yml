name: DeepSeek Top Supervisor
run-name: supervisor-${{ inputs.operation_id }}-for-${{ inputs.original_operation_id }}

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: Unique supervisor operation ID
        required: true
        type: string
      original_operation_id:
        description: Original user-task operation ID being supervised
        required: true
        type: string
      failed_run_id:
        description: Known failed production Run ID, if available
        required: false
        default: ""
        type: string
      receipt_comment_id:
        description: Durable receipt comment ID for the original operation
        required: false
        default: ""
        type: string
      failure_class:
        description: Startup, Action-edge, workflow, control, publication, budget, or other failure
        required: true
        type: string
      support_packet_json:
        description: Evidence-based Support Packet for DeepSeek REPAIR
        required: true
        type: string
      retry_dispatch_json:
        description: Original production dispatch payload for one bounded safe resume
        required: false
        default: "{}"
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write
  issues: read

concurrency:
  group: deepseek-top-supervisor-${{ inputs.original_operation_id }}
  cancel-in-progress: false

jobs:
  supervise:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip

      - name: Publish supervisor running status
        env:
          PYTHONPATH: .
        run: |
          python -m scripts.publish_operation_status \
            --operation-id "${{ inputs.operation_id }}" \
            --operation deepseek_supervisor \
            --receipt-comment-id "${{ inputs.receipt_comment_id }}" \
            --supervisor-for-operation-id "${{ inputs.original_operation_id }}" \
            --phase start \
            --active-step supervisor_diagnosis \
            --current-policy always

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare repository context
        run: git fetch origin runtime-results || true

      - name: Run highest-level DeepSeek technical supervisor
        env:
          PYTHONPATH: .
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_STEWARD_MAX_TOKENS: "12000"
          GH_TOKEN: ${{ github.token }}
          SUPPORT_PACKET_JSON: ${{ inputs.support_packet_json }}
        run: |
          python -m scripts.enrich_supervisor_packet \
            --support-packet-json "$SUPPORT_PACKET_JSON" \
            --failed-run-id "${{ inputs.failed_run_id }}" \
            > /tmp/enriched_supervisor_packet.json
          ENRICHED_SUPPORT_PACKET_JSON=$(cat /tmp/enriched_supervisor_packet.json)
          python -m scripts.top_supervisor_entrypoint \
            --operation-id "${{ inputs.operation_id }}" \
            --support-packet-json "$ENRICHED_SUPPORT_PACKET_JSON"

      - name: Deliver verified DeepSeek repository repair
        env:
          PYTHONPATH: .
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: python -m scripts.repair_delivery --operation-id "${{ inputs.operation_id }}"

      - name: Plan validated recovery-reserve-compliant resume
        env:
          PYTHONPATH: .
          GH_TOKEN: ${{ github.token }}
          RETRY_DISPATCH_JSON: ${{ inputs.retry_dispatch_json }}
        run: |
          python -m scripts.supervisor_resume \
            --mode plan \
            --supervisor-operation-id "${{ inputs.operation_id }}" \
            --original-operation-id "${{ inputs.original_operation_id }}" \
            --failed-run-id "${{ inputs.failed_run_id }}" \
            --retry-dispatch-json "$RETRY_DISPATCH_JSON"

      - name: Execute one bounded original-operation resume
        id: resume_original
        env:
          PYTHONPATH: .
          GH_TOKEN: ${{ github.token }}
        run: |
          python -m scripts.supervisor_resume \
            --mode execute \
            --supervisor-operation-id "${{ inputs.operation_id }}"

      - name: Publish final GPT-readable supervisor result
        id: publish_result
        if: always()
        env:
          PYTHONPATH: .
          GH_TOKEN: ${{ github.token }}
        run: python -m scripts.publish_runtime_result --operation-id "${{ inputs.operation_id }}"

      - name: Publish final supervisor status after resume decision
        if: always()
        env:
          PYTHONPATH: .
        run: |
          python -m scripts.publish_operation_status \
            --operation-id "${{ inputs.operation_id }}" \
            --operation deepseek_supervisor \
            --receipt-comment-id "${{ inputs.receipt_comment_id }}" \
            --supervisor-for-operation-id "${{ inputs.original_operation_id }}" \
            --phase final \
            --active-step completed \
            --job-status "${{ job.status }}" \
            --result-published "${{ steps.publish_result.outcome }}" \
            --current-policy if-owner

      - name: Build final local supervisor audit
        if: always()
        env:
          PYTHONPATH: .
          GH_TOKEN: ${{ github.token }}
        run: python -m scripts.build_operation_audit --operation-id "${{ inputs.operation_id }}"

      - name: Upload supervisor audit artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: deepseek-supervisor-${{ inputs.operation_id }}
          path: artifacts/${{ inputs.operation_id }}/
          if-no-files-found: warn
          retention-days: 7
